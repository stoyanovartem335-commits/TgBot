services:
  - type: web
    name: kalivan-telegram-bot
    runtime: python
    plan: starter
    region: oregon

    buildCommand: pip install -r requirements.txt
    startCommand: python -m bot.main

    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: MONGO_URI
        sync: false
      - key: API_SERVER_URL
        sync: false
      - key: API_ADMIN_TOKEN
        sync: false
      - key: WEBAPP_URL
        sync: false
      - key: TRIBUTE_API_URL
        value: https://tribute.tg/api/v1
      - key: TRIBUTE_API_KEY
        sync: false
      - key: TRIBUTE_PAYMENT_MODE
        value: auto
      - key: TRIBUTE_PRODUCT_URL_1M
        sync: false
      - key: TRIBUTE_PRODUCT_URL_2M
        sync: false
      - key: TRIBUTE_PRODUCT_URL_3M
        sync: false
      - key: TRIBUTE_PRODUCT_URL_6M
        sync: false
      - key: TRIBUTE_PRODUCT_URL_FOREVER
        sync: false
      - key: TRIBUTE_PRODUCT_ID_1M
        sync: false
      - key: TRIBUTE_PRODUCT_ID_2M
        sync: false
      - key: TRIBUTE_PRODUCT_ID_3M
        sync: false
      - key: TRIBUTE_PRODUCT_ID_6M
        sync: false
      - key: TRIBUTE_PRODUCT_ID_FOREVER
        sync: false
      - key: TG_CHANNEL_URL
        sync: false
      - key: SUPPORT_USERNAME
        value: KalivanVC
      - key: REQUISITES_TEXT
        value: Сбербанк
      - key: REQUISITES_CARD
        value: "2202 2020 2020 2020"
      - key: REQUISITES_NAME
        value: "Иван И."

    healthCheckPath: /health
