services:
  - type: web
    name: tgbot-zcdz
    runtime: python
    plan: starter
    region: oregon
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python -m bot.main
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: WEBAPP_URL
        value: https://tgbot-zcdz.onrender.com
      - key: BOT_TOKEN
        sync: false
      - key: BOT_USERNAME
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: SUPPORT_USERNAME
        sync: false
      - key: MONGO_URI
        sync: false
      - key: API_ADMIN_TOKEN
        sync: false
      - key: LUA_API_CRYPTO_MODE
        value: "3"
      - key: LUA_API_KEY_ID
        sync: false
      - key: LUA_API_RSA_PRIVATE_JWK_B64
        sync: false
      - key: TABLE_CSV_URL
        sync: false
      - key: ANALOGUES_CSV_URL
        sync: false
      - key: CARS_CSV_URL
        sync: false
      - key: TRIBUTE_API_KEY
        sync: false
      - key: TRIBUTE_SUBSCRIPTION_URL
        sync: false
      - key: TRIBUTE_DEBUG_WEBHOOKS
        value: "1"
      - key: TRIBUTE_ALLOWED_CHANNEL_IDS
        sync: false
      - key: TRIBUTE_ALLOWED_CHANNEL_NAMES
        sync: false
      - key: TRIBUTE_ALLOWED_SUBSCRIPTION_IDS
        sync: false
      - key: TRIBUTE_PERIOD_ID_1M
        sync: false
      - key: TRIBUTE_PERIOD_ID_2M
        sync: false
      - key: TRIBUTE_PERIOD_ID_3M
        sync: false
      - key: TRIBUTE_PERIOD_ID_6M
        sync: false
      - key: TRIBUTE_PERIOD_ID_FOREVER
        sync: false
      - key: TG_CHANNEL_URL
        sync: false
      - key: REQUISITES_TEXT
        sync: false
      - key: REQUISITES_CARD
        sync: false
      - key: REQUISITES_NAME
        sync: false
      - key: ZIP_FILE_PATH
        value: ./Price_by_KALYVAN.zip
      - key: ADMIN_WEB_SECRET_PATH
        sync: false
